<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beacon - x402 Trust Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-base: #090b0e;
      --bg-surface: #0f1114;
      --bg-elevated: #151719;
      --bg-hover: #1a1d20;
      --border: rgba(255,255,255,0.05);
      --text-primary: #e6e9ed;
      --text-secondary: #7c8491;
      --text-muted: #3d4450;
      --em: #34d399;
      --em-bright: #6ee7b7;
      --em-dim: #059669;
      --em-glow: rgba(52,211,153,0.12);
      --em-deep: rgba(52,211,153,0.04);
      --amber: #fbbf24;
      --amber-glow: rgba(251,191,36,0.1);
      --red: #f87171;
      --red-glow: rgba(248,113,113,0.1);
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* === Ambient background: responds to trust level === */
    .ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      transition: opacity 2s ease;
    }
    .ambient-green {
      position: absolute; top: -30%; left: 30%;
      width: 70%; height: 70%;
      background: radial-gradient(ellipse, rgba(52,211,153,0.07) 0%, transparent 55%);
      transition: opacity 2s ease;
    }
    .ambient-warn {
      position: absolute; top: -30%; left: 30%;
      width: 70%; height: 70%;
      background: radial-gradient(ellipse, rgba(251,191,36,0.06) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 2s ease;
    }
    .ambient-danger {
      position: absolute; top: -30%; left: 30%;
      width: 70%; height: 70%;
      background: radial-gradient(ellipse, rgba(248,113,113,0.05) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 2s ease;
    }
    .ambient-floor {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 30%;
      background: linear-gradient(to top, rgba(52,211,153,0.02) 0%, transparent 100%);
    }
    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.035;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px 256px;
    }

    /* === Shell === */
    .shell {
      position: relative; z-index: 1;
      max-width: 1000px; margin: 0 auto; padding: 0 32px;
    }

    /* === Header === */
    .header {
      padding: 32px 0 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--em);
      box-shadow: 0 0 8px var(--em-glow);
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 14px rgba(52,211,153,0.2); }
    }
    .logo-name {
      font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .nav { display: flex; gap: 6px; }
    .nav a {
      font-size: 13px; color: var(--text-muted); text-decoration: none;
      padding: 6px 12px; border-radius: 6px;
      transition: color 0.16s var(--ease), background 0.16s var(--ease);
    }
    .nav a:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
    .nav a:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(52,211,153,0.4); }

    /* === Hero === */
    .hero {
      padding: 72px 0 48px;
      display: flex; align-items: flex-end; gap: 48px;
    }
    .hero-gauge {
      position: relative; width: 160px; height: 160px; flex-shrink: 0;
    }
    .hero-gauge svg { width: 160px; height: 160px; }
    .gauge-track { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 3; }
    .gauge-value {
      fill: none; stroke-width: 3; stroke-linecap: round;
      transition: stroke-dashoffset 1.2s var(--ease), stroke 0.6s var(--ease);
      filter: drop-shadow(0 0 6px var(--em-glow));
    }
    .hero-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .hero-num {
      font-size: 52px; font-weight: 800; letter-spacing: -3px;
      font-variant-numeric: tabular-nums; line-height: 1;
      transition: color 0.6s var(--ease);
    }
    .hero-lbl {
      font-size: 12px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 2px; color: var(--text-muted); margin-top: 4px;
    }

    .hero-text { padding-bottom: 8px; }
    .hero-headline {
      font-size: 20px; font-weight: 400; color: var(--text-secondary);
      line-height: 1.5; max-width: 420px;
    }
    .hero-headline strong { color: var(--em); font-weight: 500; }
    .hero-stats {
      display: flex; gap: 24px; margin-top: 16px;
    }
    .hero-stat {
      font-size: 14px; color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .hero-stat b { color: var(--text-secondary); font-weight: 600; }

    /* === Pulse line === */
    .pulse-wrap {
      width: 100%; height: 24px; margin-bottom: 8px; overflow: hidden;
    }
    .pulse-line {
      width: 100%; height: 24px;
    }
    .pulse-path {
      fill: none; stroke: var(--em); stroke-width: 1;
      opacity: 0.2;
      animation: pulse-shift 3s linear infinite;
    }
    @keyframes pulse-shift {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* === Section dividers === */
    .divider {
      height: 1px; background: var(--border); margin: 0;
    }

    /* === Endpoints === */
    .section { padding: 32px 0; }
    .sec-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 20px;
    }

    /* Featured tier: top endpoints with full detail */
    .ep-featured {
      display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;
    }
    .ep-feat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease), transform 0.08s var(--ease);
    }
    .ep-feat-card:hover {
      border-color: rgba(52,211,153,0.12);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 32px var(--em-deep);
    }
    .ep-feat-card:active { transform: scale(0.998); }
    .ep-feat-card:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(52,211,153,0.4); }
    .ep-feat-card.best {
      border-color: rgba(52,211,153,0.08);
      box-shadow: 0 0 40px var(--em-deep);
    }

    .ep-feat-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .ep-feat-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .ep-feat-name { font-size: 16px; font-weight: 600; }
    .ep-feat-score {
      font-size: 32px; font-weight: 800; letter-spacing: -1.5px;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .ep-feat-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .ep-feat-bottom {
      display: flex; align-items: center; gap: 24px;
    }
    .ep-feat-bars {
      flex: 1; display: flex; gap: 2px; align-items: flex-end; height: 28px;
    }
    .ep-feat-bar {
      flex: 1; min-width: 3px; max-width: 12px; border-radius: 1.5px;
      transition: opacity 0.15s var(--ease);
    }
    .ep-feat-bar.ok { background: var(--em); opacity: 0.35; }
    .ep-feat-bar.ok:hover { opacity: 0.8; }
    .ep-feat-bar.fail { background: var(--red); opacity: 0.6; }
    .ep-feat-bar.fail:hover { opacity: 1; }
    .ep-feat-bar.empty { background: rgba(255,255,255,0.03); }
    .ep-feat-uptime {
      font-size: 14px; font-weight: 500; color: var(--text-secondary);
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }

    /* Compact tier: remaining endpoints, minimal */
    .ep-compact { display: flex; flex-direction: column; }
    .ep-comp-row {
      display: grid;
      grid-template-columns: 6px 1fr 140px 56px 56px;
      gap: 12px; align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.16s var(--ease), transform 0.08s var(--ease);
    }
    .ep-comp-row:first-child { border-top: 1px solid var(--border); }
    .ep-comp-row:hover { background: var(--em-deep); }
    .ep-comp-row:active { transform: scale(0.999); }
    .ep-comp-row:focus-visible { outline: none; box-shadow: inset 0 0 0 2px rgba(52,211,153,0.3); }

    .c-dot { width: 5px; height: 5px; border-radius: 50%; justify-self: center; }
    .c-dot.up { background: var(--em); box-shadow: 0 0 4px var(--em-glow); }
    .c-dot.down { background: var(--red); box-shadow: 0 0 4px var(--red-glow); }
    .c-dot.unknown { background: var(--amber); }
    .c-info { min-width: 0; }
    .c-name { font-size: 14px; font-weight: 500; }
    .c-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .c-bars {
      display: flex; gap: 1.5px; align-items: flex-end; height: 16px;
      justify-content: flex-end;
    }
    .c-bar {
      width: 3px; border-radius: 1px;
    }
    .c-bar.ok { background: var(--em); opacity: 0.3; }
    .c-bar.fail { background: var(--red); opacity: 0.5; }
    .c-bar.empty { background: rgba(255,255,255,0.03); }
    .c-trust {
      font-size: 18px; font-weight: 700; text-align: right;
      font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
    }
    .c-uptime {
      font-size: 14px; font-weight: 400; text-align: right;
      font-variant-numeric: tabular-nums; color: var(--text-secondary);
    }

    /* Tag */
    .tag-x {
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 1px 6px; border-radius: 3px; text-transform: uppercase;
      background: rgba(52,211,153,0.08); color: var(--em-bright);
      border: 1px solid rgba(52,211,153,0.08);
    }

    /* === Feed: two-column ticker === */
    .feed-section { padding: 24px 0 48px; }
    .feed-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .live-pip {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: var(--text-muted);
    }
    .live-pip-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--em);
      animation: breathe 4s ease-in-out infinite;
    }
    .feed-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0 40px;
    }
    @media (max-width: 680px) { .feed-grid { grid-template-columns: 1fr; } }
    .feed-row {
      display: grid; grid-template-columns: 5px 48px 1fr auto;
      gap: 8px; align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      font-family: 'JetBrains Mono', monospace; font-size: 14px;
    }
    .fd { width: 4px; height: 4px; border-radius: 50%; justify-self: center; }
    .fd.ok { background: var(--em); }
    .fd.fail { background: var(--red); }
    .fd.warn { background: var(--amber); }
    .ft { color: var(--text-muted); font-variant-numeric: tabular-nums; font-size: 14px; }
    .fn { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
    .fr { font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; font-size: 14px; }
    .fr.ok { color: var(--text-muted); }
    .fr.fail { color: var(--red); }
    .fr.warn { color: var(--amber); }

    /* === Footer === */
    .footer {
      padding: 20px 0; border-top: 1px solid var(--border);
      font-size: 14px; color: var(--text-muted);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a {
      color: var(--em-dim); text-decoration: none;
      transition: color 0.16s var(--ease);
    }
    .footer a:hover { color: var(--em); }
    .footer a:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(52,211,153,0.4); border-radius: 4px; }

    /* === Responsive === */
    @media (max-width: 768px) {
      .hero { flex-direction: column; align-items: flex-start; gap: 24px; padding: 48px 0 32px; }
      .hero-gauge { width: 120px; height: 120px; }
      .hero-gauge svg { width: 120px; height: 120px; }
      .hero-num { font-size: 40px; }
      .ep-comp-row { grid-template-columns: 6px 1fr 56px 56px; }
      .c-bars { display: none; }
    }

    /* === Reduced motion === */
    @media (prefers-reduced-motion: reduce) {
      .logo-dot, .live-pip-dot { animation: none; opacity: 1; }
      .pulse-path { animation: none; }
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="ambient-green" id="amb-green"></div>
    <div class="ambient-warn" id="amb-warn"></div>
    <div class="ambient-danger" id="amb-danger"></div>
    <div class="ambient-floor"></div>
  </div>
  <div class="noise"></div>

  <div class="shell">
    <header class="header">
      <div class="logo"><div class="logo-dot"></div><span class="logo-name">Beacon</span></div>
      <nav class="nav">
        <a href="/api/docs">API</a>
        <a href="/api/health">Health</a>
        <a href="/api/summary">JSON</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-gauge">
        <svg viewBox="0 0 160 160">
          <circle class="gauge-track" cx="80" cy="80" r="72" />
          <circle class="gauge-value" id="gauge-arc" cx="80" cy="80" r="72"
            stroke-dasharray="452.4" stroke-dashoffset="452.4"
            transform="rotate(-90 80 80)" stroke="var(--em)" />
        </svg>
        <div class="hero-center">
          <div class="hero-num" id="hero-trust">--</div>
          <div class="hero-lbl">Trust</div>
        </div>
      </div>
      <div class="hero-text">
        <p class="hero-headline">
          Trust layer for the <strong>x402 agent economy</strong> on Stellar.
          Agents check Beacon before spending money on API calls.
        </p>
        <div class="hero-stats">
          <span class="hero-stat"><b id="stat-ep">-</b> endpoints</span>
          <span class="hero-stat"><b id="stat-probes">-</b> probes</span>
          <span class="hero-stat"><b id="stat-up">-</b>% uptime</span>
        </div>
      </div>
    </section>

    <div class="pulse-wrap">
      <svg class="pulse-line" viewBox="0 0 2000 24" preserveAspectRatio="none">
        <path class="pulse-path" d="M0,12 L80,12 L90,4 L100,20 L110,8 L120,16 L130,12 L1000,12 L1010,4 L1020,20 L1030,8 L1040,16 L1050,12 L2000,12" />
      </svg>
    </div>

    <div class="divider"></div>

    <section class="section">
      <div class="sec-label">Endpoints</div>
      <div class="ep-featured" id="ep-featured"></div>
      <div class="ep-compact" id="ep-compact"></div>
    </section>

    <div class="divider"></div>

    <section class="feed-section">
      <div class="feed-head">
        <span class="sec-label" style="margin-bottom:0">Recent Probes</span>
        <div class="live-pip"><div class="live-pip-dot"></div> every 5m</div>
      </div>
      <div class="feed-grid" id="feed"></div>
    </section>

    <footer class="footer">
      <span>Beacon · Stellar Hacks 2026 · <a href="https://github.com/Yonkoo11/beacon">GitHub</a></span>
      <span>$0.001 USDC via <a href="/api/docs">x402</a></span>
    </footer>
  </div>

  <script>
    const CIRC = 452.4;
    function sColor(s) { return s >= 80 ? 'var(--em)' : s >= 50 ? 'var(--amber)' : 'var(--red)'; }
    function sHex(s) { return s >= 80 ? '#34d399' : s >= 50 ? '#fbbf24' : '#f87171'; }
    function fmtTime(ts) { return new Date(ts).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
    function shortUrl(url) {
      try { const u=new URL(url); const p=u.pathname.replace(/^\//,''); return u.hostname.replace('www.','')+( p?'/'+p.split('?')[0]:''); }
      catch { return url; }
    }

    // Ambient background responds to trust level
    function setAmbient(trust) {
      const g = document.getElementById('amb-green');
      const w = document.getElementById('amb-warn');
      const d = document.getElementById('amb-danger');
      if (trust >= 70) { g.style.opacity=1; w.style.opacity=0; d.style.opacity=0; }
      else if (trust >= 40) { g.style.opacity=0; w.style.opacity=1; d.style.opacity=0; }
      else { g.style.opacity=0; w.style.opacity=0; d.style.opacity=1; }
    }

    function buildBars(history, height, maxBars) {
      const el = document.createElement('div');
      el.className = height > 20 ? 'ep-feat-bars' : 'c-bars';
      el.style.height = height + 'px';
      const bars = history.slice(-maxBars);
      for (let i = bars.length; i < maxBars; i++) {
        const b = document.createElement('div');
        b.className = (height > 20 ? 'ep-feat-bar' : 'c-bar') + ' empty';
        b.style.height = '3px'; el.appendChild(b);
      }
      for (const p of bars) {
        const b = document.createElement('div');
        const cls = height > 20 ? 'ep-feat-bar' : 'c-bar';
        if (p.success) {
          const h = Math.max(3, Math.min(height, height - (p.latency_ms / 3000) * (height - 3)));
          b.className = cls + ' ok'; b.style.height = h + 'px';
        } else {
          b.className = cls + ' fail'; b.style.height = height + 'px';
        }
        el.appendChild(b);
      }
      return el;
    }

    function buildFeatured(ep, isTop) {
      const card = document.createElement('div');
      card.className = 'ep-feat-card' + (isTop ? ' best' : '');
      card.tabIndex = 0;

      const top = document.createElement('div'); top.className = 'ep-feat-top';
      const left = document.createElement('div'); left.className = 'ep-feat-left';
      const dot = document.createElement('div'); dot.className = 's-dot ' + ep.status;
      dot.style.cssText = 'width:8px;height:8px;border-radius:50%;flex-shrink:0;';
      if (ep.status === 'up') { dot.style.background = 'var(--em)'; dot.style.boxShadow = '0 0 6px var(--em-glow)'; }
      else if (ep.status === 'down') { dot.style.background = 'var(--red)'; dot.style.boxShadow = '0 0 6px var(--red-glow)'; }
      else { dot.style.background = 'var(--amber)'; }
      const name = document.createElement('span'); name.className = 'ep-feat-name'; name.textContent = ep.name;
      left.appendChild(dot); left.appendChild(name);
      if (ep.x402_valid_rate > 0) { const tag = document.createElement('span'); tag.className = 'tag-x'; tag.textContent = 'X402'; left.appendChild(tag); }
      const score = document.createElement('div'); score.className = 'ep-feat-score';
      score.style.color = sColor(ep.trust_score); score.textContent = ep.trust_score;
      top.appendChild(left); top.appendChild(score);

      const url = document.createElement('div'); url.className = 'ep-feat-url'; url.textContent = shortUrl(ep.url);

      const bottom = document.createElement('div'); bottom.className = 'ep-feat-bottom';
      if (ep.probe_history && ep.probe_history.length > 0) {
        bottom.appendChild(buildBars(ep.probe_history, 28, 36));
      }
      const uptime = document.createElement('div'); uptime.className = 'ep-feat-uptime';
      uptime.textContent = ep.uptime_score + '% uptime';
      bottom.appendChild(uptime);

      card.appendChild(top); card.appendChild(url); card.appendChild(bottom);
      return card;
    }

    function buildCompact(ep) {
      const row = document.createElement('div'); row.className = 'ep-comp-row'; row.tabIndex = 0;
      const dot = document.createElement('div'); dot.className = 'c-dot ' + ep.status;
      const info = document.createElement('div'); info.className = 'c-info';
      const name = document.createElement('div'); name.className = 'c-name'; name.textContent = ep.name;
      const url = document.createElement('div'); url.className = 'c-url'; url.textContent = shortUrl(ep.url);
      info.appendChild(name); info.appendChild(url);
      const bars = ep.probe_history && ep.probe_history.length > 0 ? buildBars(ep.probe_history, 16, 20) : document.createElement('div');
      const trust = document.createElement('div'); trust.className = 'c-trust';
      trust.style.color = sColor(ep.trust_score); trust.textContent = ep.trust_score;
      const uptime = document.createElement('div'); uptime.className = 'c-uptime';
      uptime.textContent = ep.uptime_score + '%';
      row.appendChild(dot); row.appendChild(info); row.appendChild(bars);
      row.appendChild(trust); row.appendChild(uptime);
      return row;
    }

    function probeR(p) {
      if (p.success) return { text: p.latency_ms+'ms', cls:'ok' };
      if (p.error && p.error.includes('timeout')) return { text:'timeout', cls:'warn' };
      if (p.status_code >= 500) return { text: p.status_code+'', cls:'fail' };
      return { text:'error', cls:'fail' };
    }
    function buildFeed(p) {
      const row = document.createElement('div'); row.className = 'feed-row';
      const r = probeR(p);
      const dot = document.createElement('div'); dot.className = 'fd ' + (p.success ? 'ok' : r.cls==='warn' ? 'warn' : 'fail');
      const time = document.createElement('span'); time.className = 'ft'; time.textContent = fmtTime(p.timestamp);
      const name = document.createElement('span'); name.className = 'fn'; name.textContent = shortUrl(p.url);
      const result = document.createElement('span'); result.className = 'fr ' + r.cls; result.textContent = r.text;
      row.appendChild(dot); row.appendChild(time); row.appendChild(name); row.appendChild(result);
      return row;
    }

    async function refresh() {
      try {
        const data = await (await fetch('/api/summary')).json();
        const eps = data.endpoints.sort((a,b) => b.trust_score - a.trust_score);
        const avg = eps.length > 0 ? Math.round(eps.reduce((a,e) => a+e.trust_score, 0) / eps.length) : 0;

        // Hero
        const h = document.getElementById('hero-trust');
        h.textContent = avg; h.style.color = sColor(avg);
        const arc = document.getElementById('gauge-arc');
        arc.style.strokeDashoffset = CIRC - (CIRC * (avg / 100));
        arc.style.stroke = sHex(avg);
        setAmbient(avg);

        document.getElementById('stat-ep').textContent = data.stats.endpoints_tracked;
        document.getElementById('stat-probes').textContent = data.stats.probes_today;
        document.getElementById('stat-up').textContent = data.stats.avg_uptime;

        // Split endpoints: top scoring get featured, rest get compact
        const featured = document.getElementById('ep-featured');
        const compact = document.getElementById('ep-compact');
        featured.replaceChildren(); compact.replaceChildren();

        const splitAt = Math.min(3, eps.filter(e => e.trust_score > 0).length);
        eps.forEach((ep, i) => {
          if (i < splitAt) {
            featured.appendChild(buildFeatured(ep, i === 0));
          } else {
            compact.appendChild(buildCompact(ep));
          }
        });

        // Feed
        const feed = document.getElementById('feed');
        feed.replaceChildren();
        data.recent_probes.forEach(p => feed.appendChild(buildFeed(p)));
      } catch(e) { console.error('Refresh:', e); }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
